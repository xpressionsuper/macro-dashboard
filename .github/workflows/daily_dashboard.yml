name: Daily Macro Dashboard

on:
  schedule:
    # 매일 08:30 KST = 23:30 UTC (전날)
    - cron: "30 23 * * *"
  workflow_dispatch:  # 수동 실행 허용

jobs:
  run-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas plotly requests

      - name: Run macro dashboard
        env:
          FRED_API_KEY:         ${{ secrets.FRED_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python macro_dashboard.py

      - name: Upload dashboard HTML as artifact
        uses: actions/upload-artifact@v4
        with:
          name: macro_dashboard_${{ github.run_id }}
          path: macro_dashboard.html
          retention-days: 7
