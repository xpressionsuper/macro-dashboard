name: 매크로 스트레스 리포트 v2

on:
  schedule:
     - cron: '30 23 * * 1-5'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install yfinance pandas plotly requests kaleido fredapi numpy

      - name: 리포트 실행 & 텔레그램 전송
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY:     ${{ secrets.FRED_API_KEY }}
        run: python macro_dashboard.py
